<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Corporate Welcome Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy-900: #061C22;
            --navy-800: #0A2E36;
            --navy-700: #0F3B45;
            --navy-600: #14525E;
            --gold-500: #D4AF55;
            --gold-400: #E6C877;
            --gold-300: #F0D99A;
            --ivory: #F5EFE0;
        }

        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(20, 82, 94, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 85, 0.10) 0%, transparent 55%),
                linear-gradient(135deg, #061C22 0%, #0A2E36 45%, #061C22 100%);
            color: var(--ivory);
            position: relative;
        }

        /* Fine crosshatch texture */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(212, 175, 85, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 85, 0.04) 1px, transparent 1px);
            background-size: 56px 56px;
            z-index: 0;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 85%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 85%);
        }

        /* Glowing gold orb top-right */
        .orb-1 {
            position: absolute;
            top: -140px;
            right: -100px;
            width: 560px;
            height: 560px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 85, 0.22) 0%, transparent 70%);
            filter: blur(50px);
            z-index: 0;
            animation: breathe 10s ease-in-out infinite;
        }

        .orb-2 {
            position: absolute;
            bottom: -120px;
            left: -80px;
            width: 460px;
            height: 460px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(20, 82, 94, 0.5) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
            animation: breathe 14s ease-in-out infinite reverse;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.85; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        /* Ornamental gold line */
        .ornamental-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 85, 0.4) 30%, rgba(212, 175, 85, 0.45) 70%, transparent 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 0;
        }

        /* Left panel */
        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 100px;
            position: relative;
        }

        .logo-area {
            width: 180px;
            height: 180px;
            border-radius: 28px;
            background:
                linear-gradient(145deg, rgba(212, 175, 85, 0.18) 0%, rgba(212, 175, 85, 0.06) 100%);
            border: 1px solid rgba(212, 175, 85, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 48px;
            box-shadow:
                0 10px 40px rgba(212, 175, 85, 0.15),
                inset 0 1px 0 rgba(240, 217, 154, 0.2);
            position: relative;
        }

        .logo-area::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 85, 0.15);
        }

        .logo-svg {
            width: 96px;
            height: 96px;
            filter: drop-shadow(0 4px 14px rgba(212, 175, 85, 0.4));
        }

        .welcome-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--gold-400);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .welcome-label::before {
            content: '';
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-500), transparent);
        }

        .company-name {
            font-family: 'Playfair Display', serif;
            font-size: 96px;
            font-weight: 700;
            line-height: 1.05;
            color: #fbf7ec;
            margin-bottom: 24px;
            text-shadow: 0 2px 24px rgba(212, 175, 85, 0.25);
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 300;
            color: rgba(245, 239, 224, 0.65);
            line-height: 1.5;
            max-width: 600px;
        }

        /* Right panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            position: relative;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(60deg, transparent 48%, rgba(212, 175, 85, 0.035) 48%, rgba(212, 175, 85, 0.035) 52%, transparent 52%),
                linear-gradient(-60deg, transparent 48%, rgba(20, 82, 94, 0.04) 48%, rgba(20, 82, 94, 0.04) 52%, transparent 52%);
            background-size: 90px 90px;
        }

        .info-card {
            background: linear-gradient(145deg, rgba(15, 59, 69, 0.78) 0%, rgba(10, 46, 54, 0.65) 100%);
            border: 1px solid rgba(212, 175, 85, 0.25);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 60px;
            width: 100%;
            max-width: 680px;
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(212, 175, 85, 0.15);
            position: relative;
            z-index: 1;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 85, 0.5), transparent);
        }

        .time-display {
            font-family: 'Montserrat', sans-serif;
            font-size: 120px;
            font-weight: 800;
            color: #fbf7ec;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 4px 30px rgba(212, 175, 85, 0.2);
            letter-spacing: -2px;
        }

        .date-display {
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 400;
            color: rgba(245, 239, 224, 0.6);
            margin-bottom: 48px;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold-500), var(--gold-300));
            border-radius: 2px;
            margin-bottom: 48px;
            box-shadow: 0 0 14px rgba(212, 175, 85, 0.4);
        }

        .greeting-text {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 500;
            color: #f0e8d2;
            line-height: 1.3;
            margin-bottom: 24px;
            font-style: italic;
        }

        .location-text {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 400;
            color: rgba(245, 239, 224, 0.55);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .location-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            color: var(--gold-500);
        }

        /* Bottom decorative SVG stripe */
        .bottom-decoration {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 0;
        }

        /* Floating accent badges */
        .accent-badge {
            position: absolute;
            background: rgba(10, 46, 54, 0.85);
            border: 1px solid rgba(212, 175, 85, 0.3);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 14px;
            padding: 16px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--gold-400);
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .badge-wifi { bottom: 60px; left: 100px; }
        .badge-floor { bottom: 60px; right: 100px; }

        .badge-icon {
            width: 20px;
            height: 20px;
            color: var(--gold-500);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="orb-1"></div>
    <div class="orb-2"></div>
    <div class="ornamental-line"></div>

    <!-- Bottom decorative SVG wave -->
    <svg class="bottom-decoration" viewBox="0 0 1920 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 80 C320 20, 640 100, 960 60 S1600 20, 1920 80 L1920 120 L0 120 Z" fill="rgba(212,175,85,0.07)"/>
        <path d="M0 95 C400 50, 800 110, 1200 70 S1700 40, 1920 95 L1920 120 L0 120 Z" fill="rgba(20,82,94,0.35)"/>
    </svg>

    <div class="container">
        <div class="left-panel">
            <div class="logo-area">
                <!-- Abstract building/monogram SVG logo placeholder -->
                <svg class="logo-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#F0D99A"/>
                            <stop offset="100%" stop-color="#D4AF55"/>
                        </linearGradient>
                    </defs>
                    <path d="M20 82 L20 30 L48 14 L76 30 L76 82 Z" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
                    <path d="M32 82 L32 46 L48 36 L64 46 L64 82" stroke="url(#logoGrad)" stroke-width="2" fill="none" stroke-linejoin="round" opacity="0.85"/>
                    <rect x="42" y="58" width="12" height="24" fill="url(#logoGrad)" opacity="0.9"/>
                    <circle cx="48" cy="14" r="3" fill="url(#logoGrad)"/>
                </svg>
            </div>
            <div class="welcome-label"><span data-editable="true" data-field="welcome-label">Welcome to</span></div>
            <div class="company-name" data-editable="true" data-field="company-name">Acme Corp</div>
            <div class="tagline" data-editable="true" data-field="tagline">Innovation starts here. Building the future, one idea at a time.</div>
        </div>

        <div class="right-panel">
            <div class="info-card">
                <div class="time-display" data-editable="true" data-field="time">09:30</div>
                <div class="date-display" data-editable="true" data-field="date">Monday, February 26, 2026</div>
                <div class="divider"></div>
                <div class="greeting-text" data-editable="true" data-field="greeting">Good morning! Have a wonderful day ahead.</div>
                <div class="location-text">
                    <svg class="location-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span data-editable="true" data-field="location">Main Lobby - Building A, Floor 1</span>
                </div>
            </div>
        </div>
    </div>

    <div class="accent-badge badge-wifi">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8.5C5 5.5 8.5 4 12 4s7 1.5 10 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 12c2-2 4.5-3 7-3s5 1 7 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 15.5c1.25-1.25 2.5-1.75 4-1.75s2.75 0.5 4 1.75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
        </svg>
        <span data-editable="true" data-field="wifi-name">Guest WiFi: AcmeGuest</span>
    </div>
    <div class="accent-badge badge-floor">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 21h18M5 21V10l7-5 7 5v11" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 21v-6h6v6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span data-editable="true" data-field="floor-info">Reception - Ground Floor</span>
    </div>

    <!-- Decorative inline SVG corner ornament -->
    <svg style="position:absolute;top:30px;right:30px;z-index:1;" width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M140 0 L140 140" stroke="rgba(212,175,85,0.35)" stroke-width="1"/>
        <path d="M0 0 L140 0" stroke="rgba(212,175,85,0.35)" stroke-width="1"/>
        <circle cx="140" cy="0" r="5" fill="rgba(212,175,85,0.6)"/>
        <path d="M90 0 A90 90 0 0 1 140 50" stroke="rgba(212,175,85,0.25)" stroke-width="1" fill="none"/>
        <path d="M70 0 A70 70 0 0 1 140 70" stroke="rgba(212,175,85,0.15)" stroke-width="1" fill="none"/>
    </svg>

    <svg style="position:absolute;bottom:30px;left:30px;z-index:1;" width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0 L0 140" stroke="rgba(212,175,85,0.35)" stroke-width="1"/>
        <path d="M0 140 L140 140" stroke="rgba(212,175,85,0.35)" stroke-width="1"/>
        <circle cx="0" cy="140" r="5" fill="rgba(212,175,85,0.6)"/>
        <path d="M0 90 A50 50 0 0 0 50 140" stroke="rgba(212,175,85,0.25)" stroke-width="1" fill="none"/>
        <path d="M0 70 A70 70 0 0 0 70 140" stroke="rgba(212,175,85,0.15)" stroke-width="1" fill="none"/>
    </svg>
</body>
</html>
