<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-a: #E2D0B0;
      --bg-b: #D9C4A0;
      --ink: #2C1810;
      --ink-body: #4A2D18;
      --ink-muted: #7A4A28;
      --brass: #8B6F2E;
      --accent: #A85A3E; /* terracotta */
      --rule: rgba(139,111,46,0.4);
    }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background:
        radial-gradient(ellipse at 50% 0%, rgba(168,90,62,0.07), transparent 60%),
        linear-gradient(168deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }
    body::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 19% 27%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px),
        radial-gradient(circle at 71% 64%, rgba(44,24,16,0.028) 0.5px, transparent 1px);
      background-size: 40px 40px, 60px 60px;
    }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }

    .top-bar {
      position: absolute; top: 115px; left: 130px; right: 130px; z-index: 5;
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 22px; border-bottom: 1px solid var(--rule);
    }
    .store-name {
      font-family: 'Cormorant SC', serif;
      font-size: 22px; letter-spacing: 8px;
      color: var(--ink); text-transform: uppercase; font-weight: 600;
    }
    .live {
      font-family: 'Cormorant SC', serif;
      font-size: 16px; letter-spacing: 5px;
      color: var(--accent); text-transform: uppercase; font-weight: 600;
      padding: 8px 22px; border: 1px solid var(--brass);
    }

    .header {
      position: absolute; top: 215px; left: 0; right: 0;
      text-align: center; z-index: 5;
    }
    .eyebrow {
      font-family: 'Cormorant SC', serif;
      font-size: 22px; letter-spacing: 10px;
      color: var(--brass); text-transform: uppercase; font-weight: 500;
      margin-bottom: 16px;
    }
    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 150px; font-weight: 400;
      color: var(--ink); letter-spacing: -1px; line-height: 0.92;
    }

    .countdown {
      position: absolute; top: 490px; left: 0; right: 0;
      text-align: center; z-index: 5;
    }
    .countdown-label {
      font-family: 'Cormorant SC', serif;
      font-size: 18px; letter-spacing: 8px;
      color: var(--brass); text-transform: uppercase; font-weight: 500;
      margin-bottom: 16px;
    }
    .timer {
      display: inline-flex; gap: 30px;
      padding: 22px 50px;
      border: 1px solid var(--brass);
      background: rgba(234,221,190,0.4);
      position: relative;
    }
    .timer::before {
      content: ''; position: absolute; inset: 6px;
      border: 1px solid rgba(139,111,46,0.2);
    }
    .time-unit {
      text-align: center; min-width: 90px;
    }
    .time-val {
      font-family: 'DM Serif Display', serif;
      font-size: 76px; color: var(--accent); line-height: 1;
    }
    .time-sep {
      font-family: 'DM Serif Display', serif;
      font-size: 60px; color: var(--ink-muted);
      align-self: center;
    }

    .deals {
      position: absolute; bottom: 200px; left: 140px; right: 140px; z-index: 5;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px;
    }
    .deal {
      padding: 24px 20px;
      border: 1px solid var(--brass);
      background: rgba(234,221,190,0.4);
      text-align: center; position: relative;
    }
    .deal::before {
      content: ''; position: absolute; inset: 6px;
      border: 1px solid rgba(139,111,46,0.22);
    }
    .deal-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px; color: var(--ink);
      margin-bottom: 10px;
    }
    .deal-discount {
      font-family: 'DM Serif Display', serif;
      font-size: 32px; color: var(--accent);
      padding-top: 10px; border-top: 1px solid var(--rule);
    }

    .bottom-bar {
      position: absolute; bottom: 108px; left: 130px; right: 130px; z-index: 5;
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 20px; border-top: 1px solid var(--rule);
    }
    .terms {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 14px; color: var(--ink-muted);
    }
    .promo-code {
      font-family: 'Cormorant SC', serif;
      font-size: 18px; letter-spacing: 5px;
      color: var(--accent); text-transform: uppercase; font-weight: 600;
      padding: 10px 22px; border: 1px solid var(--brass);
    }
  </style>
</head>
<body>
  <div class="frame"></div>

  <div class="top-bar">
    <div class="store-name" data-editable="true" data-field="store_name">YOUR STORE NAME</div>
    <div class="live" data-editable="true" data-field="live_text">SALE IS LIVE</div>
  </div>

  <div class="header">
    <div class="eyebrow" data-editable="true" data-field="flash_label">LIMITED TIME ONLY</div>
    <h1 class="title" data-editable="true" data-field="flash_title">Flash Sale</h1>
  </div>

  <div class="countdown">
    <div class="countdown-label" data-editable="true" data-field="countdown_label">ENDS IN</div>
    <div class="timer">
      <div class="time-unit">
        <div class="time-val" data-editable="true" data-field="hours">04</div>
      </div>
      <div class="time-sep">:</div>
      <div class="time-unit">
        <div class="time-val" data-editable="true" data-field="minutes">32</div>
      </div>
      <div class="time-sep">:</div>
      <div class="time-unit">
        <div class="time-val" data-editable="true" data-field="seconds">17</div>
      </div>
    </div>
  </div>

  <div class="deals">
    <div class="deal">
      <div class="deal-name" data-editable="true" data-field="deal1_name">Headphones</div>
      <div class="deal-discount" data-editable="true" data-field="deal1_discount">60% OFF</div>
    </div>
    <div class="deal">
      <div class="deal-name" data-editable="true" data-field="deal2_name">Sneakers</div>
      <div class="deal-discount" data-editable="true" data-field="deal2_discount">45% OFF</div>
    </div>
    <div class="deal">
      <div class="deal-name" data-editable="true" data-field="deal3_name">Smartwatches</div>
      <div class="deal-discount" data-editable="true" data-field="deal3_discount">50% OFF</div>
    </div>
    <div class="deal">
      <div class="deal-name" data-editable="true" data-field="deal4_name">Gaming</div>
      <div class="deal-discount" data-editable="true" data-field="deal4_discount">40% OFF</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="terms" data-editable="true" data-field="terms">While supplies last. In-store and online. Cannot combine with other offers.</div>
    <div class="promo-code" data-editable="true" data-field="promo_code">USE CODE: FLASH60</div>
  </div>
</body>
</html>
