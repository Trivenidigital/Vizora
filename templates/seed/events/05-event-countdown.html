<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Event Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-a: #EADDBE;
      --bg-b: #E2D0B0;
      --ink: #2C1810;
      --ink-body: #4A2D18;
      --ink-muted: #7A4A28;
      --brass: #8B6F2E;
      --royal: #3D1F14;
      --accent: #6B2737;
      --rule: rgba(139,111,46,0.4);
    }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background:
        radial-gradient(ellipse at 30% 0%, rgba(139,111,46,0.08), transparent 60%),
        radial-gradient(ellipse at 70% 100%, rgba(107,39,55,0.06), transparent 55%),
        linear-gradient(165deg, #EADDBE 0%, #E2D0B0 100%);
    }
    body::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 21% 29%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px),
        radial-gradient(circle at 71% 64%, rgba(44,24,16,0.028) 0.5px, transparent 1px);
      background-size: 38px 38px, 54px 54px;
    }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }

    .header {
      position: absolute; top: 160px; left: 0; right: 0;
      text-align: center; z-index: 5;
    }
    .crest { display: block; margin: 0 auto 20px; opacity: 0.85; }
    .section-label {
      font-family: 'Cormorant SC', serif;
      font-size: 20px; letter-spacing: 8px; font-weight: 600;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 16px;
    }
    .event-name {
      font-family: 'DM Serif Display', serif;
      font-size: 84px; color: var(--royal);
      line-height: 0.95; letter-spacing: -0.5px;
    }

    .countdown {
      position: absolute; top: 440px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 40px; z-index: 5;
    }
    .countdown-item {
      width: 260px; padding: 44px 20px 32px;
      background: rgba(255,248,232,0.34);
      border: 1px solid var(--brass);
      text-align: center; position: relative;
    }
    .countdown-item::before {
      content: ''; position: absolute; inset: 9px;
      border: 1px solid rgba(139,111,46,0.22); pointer-events: none;
    }
    .countdown-number {
      font-family: 'DM Serif Display', serif;
      font-size: 140px; color: var(--accent);
      line-height: 1; letter-spacing: -3px;
      display: block;
    }
    .countdown-rule {
      width: 50px; height: 1px; background: var(--brass);
      margin: 16px auto 14px;
    }
    .countdown-label {
      font-family: 'Cormorant SC', serif;
      font-size: 15px; letter-spacing: 5px; font-weight: 600;
      color: var(--brass); text-transform: uppercase;
    }

    .info {
      position: absolute; bottom: 220px; left: 0; right: 0;
      text-align: center; z-index: 5;
    }
    .event-date {
      font-family: 'Cormorant SC', serif;
      font-size: 20px; letter-spacing: 6px; font-weight: 600;
      color: var(--brass); text-transform: uppercase;
    }
    .event-venue {
      display: block; margin-top: 10px;
      font-family: 'Lora', serif; font-style: italic;
      font-size: 22px; color: var(--ink-muted);
    }

    .cta-row {
      position: absolute; bottom: 110px; left: 0; right: 0;
      text-align: center; z-index: 5;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      margin: 0 240px;
    }
    .cta-text {
      font-family: 'DM Serif Display', serif; font-style: italic;
      font-size: 24px; color: var(--royal);
    }
    .cta-url {
      display: block; margin-top: 6px;
      font-family: 'Cormorant SC', serif;
      font-size: 15px; letter-spacing: 5px;
      color: var(--brass); text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="frame"></div>

  <div class="header">
    <svg class="crest" width="96" height="38" viewBox="0 0 96 38">
      <g fill="none" stroke="#8B6F2E" stroke-width="1.2">
        <path d="M10 34 L10 16 L24 26 L40 6 L48 20 L56 6 L72 26 L86 16 L86 34 Z" fill="rgba(139,111,46,0.14)"/>
        <circle cx="48" cy="4" r="2" fill="#6B2737" stroke="none"/>
      </g>
    </svg>
    <div class="section-label" data-editable="true" data-field="sectionLabel">Countdown to Launch</div>
    <h1 class="event-name" data-editable="true" data-field="eventName">INNOVATION SUMMIT 2026</h1>
  </div>

  <div class="countdown">
    <div class="countdown-item">
      <span class="countdown-number" data-editable="true" data-field="countdownDays">42</span>
      <div class="countdown-rule"></div>
      <div class="countdown-label">Days</div>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" data-editable="true" data-field="countdownHours">08</span>
      <div class="countdown-rule"></div>
      <div class="countdown-label">Hours</div>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" data-editable="true" data-field="countdownMinutes">15</span>
      <div class="countdown-rule"></div>
      <div class="countdown-label">Minutes</div>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" data-editable="true" data-field="countdownSeconds">30</span>
      <div class="countdown-rule"></div>
      <div class="countdown-label">Seconds</div>
    </div>
  </div>

  <div class="info">
    <span class="event-date" data-editable="true" data-field="eventDate">APRIL 22-23, 2026</span>
    <span class="event-venue" data-editable="true" data-field="eventVenue">Grand Pavilion, San Francisco</span>
  </div>

  <div class="cta-row">
    <span class="cta-text" data-editable="true" data-field="ctaText">Don't miss out &mdash; Register today</span>
    <span class="cta-url" data-editable="true" data-field="ctaUrl">innovationsummit.io/register</span>
  </div>
</body>
</html>
