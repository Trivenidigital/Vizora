name: Security Audit
on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check for hardcoded JWTs
        run: pnpm security:no-hardcoded-jwts
      # Blocking gate: fails the build on any FIXABLE high/critical advisory in
      # production dependencies (what actually ships). --prod excludes dev/build
      # tooling transitives (the class that got this gate disabled); --ignore-unfixable
      # keeps a valve so a future prod high with no released patch can't red the gate
      # while every fixable one still must be fixed. --ignore-registry-errors avoids a
      # false red on a registry hiccup. See docs/plans/2026-07-06-production-readiness-audit.md S1-3.
      - name: Security audit (production deps — blocks on fixable high/critical)
        run: pnpm audit --prod --audit-level=high --ignore-unfixable --ignore-registry-errors
      # Non-blocking full report so moderate/low + dev-tooling advisories stay visible.
      - name: Security audit (full report — informational)
        continue-on-error: true
        run: pnpm audit --audit-level=moderate
