name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  # Required environment variables for tests
  NODE_ENV: test
  JWT_SECRET: test-jwt-secret-at-least-32-characters-long
  DEVICE_JWT_SECRET: test-device-jwt-secret-that-is-32-chars
  DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
  MONGODB_URL: mongodb://localhost:27017/test_db
  REDIS_URL: redis://localhost:6379
  MINIO_ENDPOINT: localhost
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: test-bucket
  NEXT_PUBLIC_API_URL: http://localhost:3000
  NEXT_PUBLIC_SOCKET_URL: http://localhost:3002
  BACKEND_URL: http://localhost:3000

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Generate Prisma client for tests
      - name: Generate Prisma client
        run: |
          pnpm --filter @vizora/database exec prisma generate
          mkdir -p packages/database/dist/generated
          cp -r packages/database/src/generated/* packages/database/dist/generated/

      # Build @vizora/database so consumers can resolve `import { PrismaClient } from '@vizora/database'`
      - name: Build @vizora/database
        run: npx nx build @vizora/database

      # Push schema to test database
      - name: Setup test database
        run: pnpm --filter @vizora/database exec prisma db push --skip-generate

      - name: Run middleware unit tests
        working-directory: middleware
        run: pnpm test --passWithNoTests

      - name: Run realtime unit tests
        working-directory: realtime
        run: pnpm test --passWithNoTests

      - name: Run web unit tests
        working-directory: web
        run: pnpm test --runInBand

      - name: Run display unit tests
        working-directory: display
        run: pnpm test:ci

      - name: Typecheck display client
        working-directory: display
        run: pnpm typecheck

      - name: Run ops unit tests
        run: pnpm test:ops

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: middleware/coverage
          fail_ci_if_error: false

  # Apply the hand-written migration SQL against an EMPTY database, exactly as
  # `prisma migrate deploy` does on prod. The test/e2e jobs seed via
  # `prisma db push` (schema-direct), which NEVER executes migrations/*.sql — so
  # a broken migration (e.g. the #227 wrong-table-name) passed CI green and only
  # detonated on the prod deploy. This job closes that gap.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: migrate_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/migrate_db
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Neutralize CONCURRENTLY for the clean CI replay (committed files untouched)
        run: |
          # `CREATE INDEX CONCURRENTLY` cannot run inside migrate deploy's transaction
          # (Postgres 25001 / Prisma P3018). On an EMPTY CI database the CONCURRENTLY
          # lock-avoidance is irrelevant to correctness, so strip it in the ephemeral CI
          # checkout only — the committed migration files (and their prod checksums) stay
          # byte-identical. This lets `migrate deploy` replay the full history and still
          # catch bad migration SQL (wrong table/column names — the #227 class).
          # NOTE: a true disaster-recovery `migrate deploy` from empty still needs these
          # CONCURRENTLY migrations handled manually; tracked as a follow-up.
          find packages/database/prisma/migrations -name migration.sql \
            -exec sed -i 's/INDEX CONCURRENTLY/INDEX/g' {} +

      - name: Apply all migrations from empty (fails on bad migration SQL)
        run: pnpm --filter @vizora/database exec prisma migrate deploy

      - name: Assert migration state is clean (all applied, none pending/failed)
        run: pnpm --filter @vizora/database exec prisma migrate status

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: |
          pnpm --filter @vizora/database exec prisma generate
          mkdir -p packages/database/dist/generated
          cp -r packages/database/src/generated/* packages/database/dist/generated/

      - name: Build @vizora/database
        run: npx nx build @vizora/database

      - name: Setup test database
        run: pnpm --filter @vizora/database exec prisma db push --skip-generate

      # Only a narrow middleware E2E set is gated in CI right now.
      # The other middleware e2e specs (content/displays/playlists/auth/rate-limit)
      # have pre-existing failures that predate this pipeline — they never ran
      # in CI before (the old `middleware-e2e` Nx project didn't exist), so they
      # drifted. The customer-critical-path suite is intentionally included so
      # CI proves register -> pair -> content -> playlist -> schedule -> device
      # active-schedule delivery through the production /api/v1 route shape.
      - name: Run middleware E2E tests (gated suites)
        run: pnpm --filter @vizora/middleware exec jest --config=jest.e2e.config.js --runInBand --testPathPattern="(agents|customer-critical-path|tenant-guard|b12-multi-tenant-revocation)"

      # Realtime e2e (device-gateway.e2e-spec.ts) has a known pre-existing
       # failure in CI — it requires Prisma generate state + a MongoDB service
       # that the old Nx-based pipeline used to set up but no longer exists.
       # Tracked separately; non-blocking until the suite is rebuilt.
      - name: Run realtime E2E tests
        continue-on-error: true
        run: pnpm --filter @vizora/realtime test:e2e

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: |
          pnpm --filter @vizora/database exec prisma generate
          mkdir -p packages/database/dist/generated
          cp -r packages/database/src/generated/* packages/database/dist/generated/

      - name: Build @vizora/database
        run: npx nx build @vizora/database

      - name: Build middleware
        run: npx nx build @vizora/middleware

      - name: Build web
        env:
          NEXT_PUBLIC_API_URL: https://vizora.cloud
          NEXT_PUBLIC_SOCKET_URL: https://vizora.cloud
          BACKEND_URL: https://vizora.cloud
        run: npx nx build @vizora/web

      - name: Build realtime
        run: npx nx build @vizora/realtime

      - name: Build display client
        working-directory: display
        run: pnpm build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check for hardcoded JWTs
        run: pnpm security:no-hardcoded-jwts
      # Blocking gate on fixable high/critical advisories in production deps.
      # No --ignore-registry-errors here (unlike the scheduled security-audit.yml):
      # a PR gate should fail CLOSED on a registry error (transient red is re-runnable;
      # a silent pass is a hole). See docs/plans/2026-07-06-production-readiness-audit.md S1-3.
      - name: Security audit (production deps — blocks on fixable high/critical)
        run: pnpm audit --prod --audit-level=high --ignore-unfixable
