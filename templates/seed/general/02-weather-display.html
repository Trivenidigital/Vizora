<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-a: #E2D0B0; --bg-b: #D9C4A0;
      --ink: #2C1810; --ink-body: #4A2D18; --ink-muted: #7A4A28;
      --brass: #8B6F2E; --accent: #2F4858;
    }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background: radial-gradient(ellipse at 50% 0%, rgba(47,72,88,0.06), transparent 60%), linear-gradient(168deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }
    body::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle at 22% 30%, rgba(44,24,16,0.03) 0.5px, transparent 1px), radial-gradient(circle at 70% 65%, rgba(44,24,16,0.025) 0.5px, transparent 1px);
      background-size: 46px 46px, 70px 70px; }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }
    .header { position: absolute; top: 130px; left: 0; right: 0; text-align: center; z-index: 5; }
    .eyebrow { font-family: 'Cormorant SC', serif; font-size: 20px; letter-spacing: 7px; color: var(--brass); text-transform: uppercase; font-weight: 500; margin-bottom: 14px; }
    .location { font-family: 'DM Serif Display', serif; font-size: 72px; color: var(--ink); line-height: 1; }
    .date { font-family: 'Lora', serif; font-style: italic; font-size: 24px; color: var(--ink-muted); margin-top: 14px; }
    .updated { font-family: 'Cormorant SC', serif; font-size: 14px; letter-spacing: 4px; color: var(--accent); margin-top: 10px; text-transform: uppercase; }
    .current { position: absolute; top: 370px; left: 0; right: 0; text-align: center; z-index: 5; }
    .temp-wrap { display: inline-flex; align-items: flex-start; justify-content: center; gap: 18px; }
    .temp { font-family: 'DM Serif Display', serif; font-size: 280px; color: var(--accent); line-height: 0.85; letter-spacing: -6px; }
    .deg { font-family: 'DM Serif Display', serif; font-size: 100px; color: var(--brass); line-height: 1; margin-top: 20px; }
    .condition { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 36px; color: var(--ink); margin-top: 20px; }
    .metrics { position: absolute; top: 720px; left: 200px; right: 200px; z-index: 5; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; }
    .metric { text-align: center; padding: 20px 10px; border: 1px solid rgba(139,111,46,0.3); background: rgba(255,248,232,0.25); position: relative; }
    .metric::before { content: ''; position: absolute; inset: 4px; border: 1px solid rgba(139,111,46,0.15); pointer-events: none; }
    .metric-label { font-family: 'Cormorant SC', serif; font-size: 13px; letter-spacing: 4px; color: var(--brass); text-transform: uppercase; margin-bottom: 8px; }
    .metric-value { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); }
    .forecast { position: absolute; bottom: 110px; left: 200px; right: 200px; z-index: 5; display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .day { text-align: center; }
    .day-name { font-family: 'Cormorant SC', serif; font-size: 16px; letter-spacing: 4px; color: var(--brass); text-transform: uppercase; margin-bottom: 8px; }
    .day-temp { font-family: 'DM Serif Display', serif; font-size: 34px; color: var(--ink); }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="header">
    <div class="eyebrow">Local Weather</div>
    <div class="location" data-editable="true" data-field="locationName">San Francisco, CA</div>
    <div class="date" data-editable="true" data-field="currentDate">Wednesday, January 15, 2026</div>
    <div class="updated" data-editable="true" data-field="lastUpdated">Updated 2:30 PM</div>
  </div>
  <div class="current">
    <div class="temp-wrap">
      <div class="temp" data-editable="true" data-field="temperature">72</div>
      <div class="deg">&deg;</div>
    </div>
    <div class="condition" data-editable="true" data-field="condition">Clear &amp; Sunny</div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Humidity</div><div class="metric-value" data-editable="true" data-field="humidity">45%</div></div>
    <div class="metric"><div class="metric-label">Wind</div><div class="metric-value" data-editable="true" data-field="wind">12 mph</div></div>
    <div class="metric"><div class="metric-label">UV Index</div><div class="metric-value" data-editable="true" data-field="uvIndex">6 High</div></div>
    <div class="metric"><div class="metric-label">Feels Like</div><div class="metric-value" data-editable="true" data-field="feelsLike">70&deg;F</div></div>
  </div>
  <div class="forecast">
    <div class="day"><div class="day-name" data-editable="true" data-field="day1Name">Thu</div><div class="day-temp" data-editable="true" data-field="day1Temp">74&deg; </div></div>
    <div class="day"><div class="day-name" data-editable="true" data-field="day2Name">Fri</div><div class="day-temp" data-editable="true" data-field="day2Temp">68&deg; </div></div>
    <div class="day"><div class="day-name" data-editable="true" data-field="day3Name">Sat</div><div class="day-temp" data-editable="true" data-field="day3Temp">65&deg; </div></div>
    <div class="day"><div class="day-name" data-editable="true" data-field="day4Name">Sun</div><div class="day-temp" data-editable="true" data-field="day4Temp">60&deg; </div></div>
    <div class="day"><div class="day-name" data-editable="true" data-field="day5Name">Mon</div><div class="day-temp" data-editable="true" data-field="day5Temp">45&deg; </div></div>
  </div>
</body>
</html>
