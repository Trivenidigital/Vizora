<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-a: #E2D0B0; --bg-b: #D9C4A0; --ink: #2C1810; --ink-body: #4A2D18; --ink-muted: #7A4A28; --brass: #8B6F2E; }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background: radial-gradient(ellipse at 50% 0%, rgba(139,111,46,0.1), transparent 60%), linear-gradient(168deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }
    body::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle at 22% 30%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px), radial-gradient(circle at 70% 65%, rgba(44,24,16,0.028) 0.5px, transparent 1px);
      background-size: 42px 42px, 66px 66px; }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }
    .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; }
    .ornament { margin-bottom: 30px; opacity: 0.8; }
    .badge { font-family: 'Cormorant SC', serif; font-size: 22px; letter-spacing: 8px; color: var(--brass); text-transform: uppercase; margin-bottom: 24px; }
    .script { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 60px; color: var(--ink-muted); margin-bottom: 10px; }
    .title { font-family: 'DM Serif Display', serif; font-size: 180px; color: var(--ink); line-height: 0.9; letter-spacing: -2px; }
    .year { font-family: 'DM Serif Display', serif; font-size: 160px; color: var(--brass); line-height: 1; margin: 20px 0 30px; letter-spacing: 4px; }
    .msg { font-family: 'Lora', serif; font-style: italic; font-size: 26px; color: var(--ink-muted); max-width: 1100px; line-height: 1.5; margin-bottom: 40px; }
    .msg::before, .msg::after { content: '\2014'; color: var(--brass); margin: 0 14px; }
    .org { font-family: 'Cormorant SC', serif; font-size: 20px; letter-spacing: 7px; color: var(--brass); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="center">
    <svg class="ornament" width="120" height="40" viewBox="0 0 120 40"><g fill="none" stroke="#8B6F2E" stroke-width="1.2"><path d="M10 20 Q40 4 60 20 Q80 36 110 20"/><circle cx="60" cy="20" r="3" fill="#8B6F2E"/><circle cx="10" cy="20" r="1.5" fill="#8B6F2E"/><circle cx="110" cy="20" r="1.5" fill="#8B6F2E"/></g></svg>
    <div class="badge" data-editable="true" data-field="yearBadge">Celebrating a New Beginning</div>
    <div class="script" data-editable="true" data-field="heroScript">Wishing You a</div>
    <h1 class="title" data-editable="true" data-field="heroTitle">Happy New Year</h1>
    <div class="year" data-editable="true" data-field="heroYear">2026</div>
    <p class="msg" data-editable="true" data-field="heroMessage">May this year bring you joy, prosperity, and wonderful new adventures. Here's to new beginnings and exciting possibilities ahead.</p>
    <div class="org" data-editable="true" data-field="organizationName">Your Company Name</div>
  </div>
</body>
</html>
