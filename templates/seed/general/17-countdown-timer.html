<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-a: #E2D0B0; --bg-b: #D9C4A0; --ink: #2C1810; --ink-body: #4A2D18; --ink-muted: #7A4A28; --brass: #8B6F2E; --accent: #6B2737; }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background: radial-gradient(ellipse at 50% 0%, rgba(107,39,55,0.08), transparent 60%), linear-gradient(168deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }
    body::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle at 22% 30%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px), radial-gradient(circle at 70% 65%, rgba(44,24,16,0.028) 0.5px, transparent 1px);
      background-size: 42px 42px, 66px 66px; }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }
    .header { position: absolute; top: 140px; left: 0; right: 0; text-align: center; z-index: 5; }
    .eyebrow { font-family: 'Cormorant SC', serif; font-size: 22px; letter-spacing: 8px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }
    .title { font-family: 'DM Serif Display', serif; font-size: 120px; color: var(--ink); line-height: 0.95; letter-spacing: -1px; }
    .tagline { font-family: 'Lora', serif; font-style: italic; font-size: 28px; color: var(--ink-muted); margin-top: 18px; }
    .tagline::before, .tagline::after { content: '\2014'; color: var(--brass); margin: 0 14px; }
    .countdown-label { position: absolute; top: 480px; left: 0; right: 0; text-align: center; z-index: 5; font-family: 'Cormorant SC', serif; font-size: 18px; letter-spacing: 7px; color: var(--brass); text-transform: uppercase; }
    .countdown { position: absolute; top: 530px; left: 200px; right: 200px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; z-index: 5; }
    .unit { text-align: center; padding: 40px 20px; border: 1px solid var(--brass); background: rgba(255,248,232,0.3); position: relative; }
    .unit::before { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(139,111,46,0.22); pointer-events: none; }
    .unit-value { font-family: 'DM Serif Display', serif; font-size: 160px; color: var(--accent); line-height: 0.9; letter-spacing: -2px; }
    .unit-label { font-family: 'Cormorant SC', serif; font-size: 16px; letter-spacing: 6px; color: var(--brass); text-transform: uppercase; margin-top: 14px; }
    .footer { position: absolute; bottom: 120px; left: 200px; right: 200px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; z-index: 5; padding-top: 24px; border-top: 1px solid rgba(139,111,46,0.4); text-align: center; }
    .foot-label { font-family: 'Cormorant SC', serif; font-size: 13px; letter-spacing: 5px; color: var(--brass); text-transform: uppercase; margin-bottom: 6px; }
    .foot-value { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--ink); }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="header">
    <div class="eyebrow" data-editable="true" data-field="eyebrow">The Wait Is Almost Over</div>
    <h1 class="title" data-editable="true" data-field="eventTitle">NEON PULSE 2026</h1>
    <p class="tagline" data-editable="true" data-field="eventTagline">The Electronic Music Festival of the Year</p>
  </div>
  <div class="countdown-label" data-editable="true" data-field="countdownLabel">Countdown to Showtime</div>
  <div class="countdown">
    <div class="unit"><div class="unit-value" data-editable="true" data-field="daysValue">14</div><div class="unit-label" data-editable="true" data-field="daysLabel">Days</div></div>
    <div class="unit"><div class="unit-value" data-editable="true" data-field="hoursValue">06</div><div class="unit-label" data-editable="true" data-field="hoursLabel">Hours</div></div>
    <div class="unit"><div class="unit-value" data-editable="true" data-field="minutesValue">42</div><div class="unit-label" data-editable="true" data-field="minutesLabel">Minutes</div></div>
    <div class="unit"><div class="unit-value" data-editable="true" data-field="secondsValue">18</div><div class="unit-label" data-editable="true" data-field="secondsLabel">Seconds</div></div>
  </div>
  <div class="footer">
    <div><div class="foot-label" data-editable="true" data-field="venueLabel">Venue</div><div class="foot-value" data-editable="true" data-field="venueValue">Neon Arena · Los Angeles</div></div>
    <div><div class="foot-label" data-editable="true" data-field="hashLabel">Join The Conversation</div><div class="foot-value" data-editable="true" data-field="hashValue">#NEONPULSE2026</div></div>
    <div><div class="foot-label" data-editable="true" data-field="datesLabel">Festival Dates</div><div class="foot-value" data-editable="true" data-field="datesValue">April 24 – 26, 2026</div></div>
  </div>
</body>
</html>
