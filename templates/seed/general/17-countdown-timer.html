<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }
    @keyframes breathe { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.08); } }
    @keyframes scanline {
      from { background-position: 0 0; }
      to { background-position: 0 80px; }
    }
    @keyframes neonGlow {
      0%,100% { text-shadow: 0 0 20px rgba(255,0,170,0.8), 0 0 40px rgba(255,0,170,0.5), 0 0 80px rgba(255,0,170,0.3); }
      50% { text-shadow: 0 0 30px rgba(255,0,170,1), 0 0 60px rgba(255,0,170,0.7), 0 0 120px rgba(255,0,170,0.5); }
    }
    @keyframes cyanGlow {
      0%,100% { text-shadow: 0 0 20px rgba(0,230,255,0.8), 0 0 40px rgba(0,230,255,0.5), 0 0 80px rgba(0,230,255,0.3); }
      50% { text-shadow: 0 0 30px rgba(0,230,255,1), 0 0 60px rgba(0,230,255,0.7), 0 0 120px rgba(0,230,255,0.5); }
    }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255,0,170,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(0,230,255,0.18) 0%, transparent 50%),
        linear-gradient(155deg, #050012 0%, #0a0320 35%, #060118 70%, #030010 100%);
      color: #ffffff;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(180deg, transparent 79px, rgba(0,230,255,0.02) 80px);
      background-size: 30px 30px, 100% 80px;
      animation: scanline 3s linear infinite;
      z-index: 0;
    }

    .glow-1 {
      position: absolute;
      top: -180px; left: -140px;
      width: 820px; height: 820px;
      background: radial-gradient(circle, rgba(255,0,170,0.25) 0%, rgba(255,0,170,0.06) 40%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
      animation: breathe 7s ease-in-out infinite;
    }
    .glow-2 {
      position: absolute;
      bottom: -200px; right: -150px;
      width: 820px; height: 820px;
      background: radial-gradient(circle, rgba(0,230,255,0.22) 0%, rgba(0,230,255,0.05) 40%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
      animation: breathe 9s ease-in-out 1.5s infinite;
    }
    .glow-3 {
      position: absolute;
      top: 30%; left: 50%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(147,51,234,0.12) 0%, transparent 60%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      animation: breathe 11s ease-in-out 3s infinite;
    }

    .neon-bar-top, .neon-bar-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        #ff00aa 15%,
        #ff00aa 30%,
        #9333ea 50%,
        #00e6ff 70%,
        #00e6ff 85%,
        transparent 100%);
      z-index: 5;
      box-shadow: 0 0 20px rgba(255,0,170,0.8), 0 0 40px rgba(0,230,255,0.5);
    }
    .neon-bar-top { top: 0; }
    .neon-bar-bottom { bottom: 0; }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 90px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .header {
      text-align: center;
      animation: fadeUp 1s ease-out both;
    }

    .eyebrow-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 28px;
      background: rgba(255,0,170,0.1);
      border: 1.5px solid rgba(255,0,170,0.6);
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ff00aa;
      box-shadow: 0 0 30px rgba(255,0,170,0.3), inset 0 0 20px rgba(255,0,170,0.1);
      margin-bottom: 24px;
    }
    .eyebrow-badge .live-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ff00aa;
      box-shadow: 0 0 16px #ff00aa;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .event-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 110px;
      letter-spacing: 6px;
      line-height: 0.95;
      color: #ffffff;
      animation: cyanGlow 3s ease-in-out infinite;
    }

    .event-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 32px;
      color: rgba(255,255,255,0.7);
      margin-top: 14px;
      letter-spacing: 2px;
      animation: fadeUp 1s ease-out 0.3s both;
    }

    .countdown-label {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-align: center;
      margin-bottom: 24px;
      animation: fadeUp 1s ease-out 0.45s both;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      width: 100%;
      max-width: 1500px;
    }

    .count-unit {
      position: relative;
      padding: 44px 20px 38px;
      background: linear-gradient(160deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
      border: 2px solid rgba(0,230,255,0.3);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      text-align: center;
      box-shadow:
        0 0 60px rgba(0,230,255,0.15),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .count-unit::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00e6ff, transparent);
    }
    .count-unit::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff00aa, transparent);
    }

    .count-unit:nth-child(1) { animation: scaleIn 0.9s ease-out 0.55s both; }
    .count-unit:nth-child(2) { animation: scaleIn 0.9s ease-out 0.7s both; }
    .count-unit:nth-child(3) { animation: scaleIn 0.9s ease-out 0.85s both; }
    .count-unit:nth-child(4) { animation: scaleIn 0.9s ease-out 1s both; }

    .count-unit:nth-child(even) {
      border-color: rgba(255,0,170,0.3);
      box-shadow:
        0 0 60px rgba(255,0,170,0.15),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .count-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 200px;
      line-height: 0.9;
      color: #ffffff;
      letter-spacing: -2px;
      animation: cyanGlow 3s ease-in-out infinite;
    }
    .count-unit:nth-child(even) .count-number {
      animation: neonGlow 3s ease-in-out infinite;
    }

    .count-label {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(0,230,255,0.85);
      margin-top: 14px;
    }
    .count-unit:nth-child(even) .count-label {
      color: rgba(255,0,170,0.85);
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 40px;
      width: 100%;
      padding-top: 20px;
      animation: fadeUp 1s ease-out 1.15s both;
    }

    .footer-item {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .footer-item.right {
      justify-self: end;
    }
    .footer-icon {
      width: 48px; height: 48px;
      border: 2px solid rgba(0,230,255,0.4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,230,255,0.06);
      box-shadow: 0 0 20px rgba(0,230,255,0.2);
    }
    .footer-item.right .footer-icon {
      border-color: rgba(255,0,170,0.4);
      background: rgba(255,0,170,0.06);
      box-shadow: 0 0 20px rgba(255,0,170,0.2);
    }

    .footer-text {
      display: flex;
      flex-direction: column;
    }
    .footer-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .footer-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: #ffffff;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .footer-center {
      text-align: center;
    }
    .footer-center-label {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .footer-center-hashtag {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      color: #00e6ff;
      margin-top: 4px;
      text-shadow: 0 0 20px rgba(0,230,255,0.6);
    }
  </style>
</head>
<body>
  <div class="neon-bar-top"></div>
  <div class="neon-bar-bottom"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>

  <div class="container">
    <div class="header">
      <div class="eyebrow-badge">
        <div class="live-dot"></div>
        <span data-editable="true" data-field="eyebrow">The Wait Is Almost Over</span>
      </div>
      <h1 class="event-title" data-editable="true" data-field="eventTitle">NEON PULSE 2026</h1>
      <div class="event-tagline" data-editable="true" data-field="eventTagline">The Electronic Music Festival of the Year</div>
    </div>

    <div>
      <div class="countdown-label" data-editable="true" data-field="countdownLabel">Countdown to Showtime</div>
      <div class="countdown-grid">
        <div class="count-unit">
          <div class="count-number" data-editable="true" data-field="daysValue">14</div>
          <div class="count-label" data-editable="true" data-field="daysLabel">Days</div>
        </div>
        <div class="count-unit">
          <div class="count-number" data-editable="true" data-field="hoursValue">06</div>
          <div class="count-label" data-editable="true" data-field="hoursLabel">Hours</div>
        </div>
        <div class="count-unit">
          <div class="count-number" data-editable="true" data-field="minutesValue">42</div>
          <div class="count-label" data-editable="true" data-field="minutesLabel">Minutes</div>
        </div>
        <div class="count-unit">
          <div class="count-number" data-editable="true" data-field="secondsValue">18</div>
          <div class="count-label" data-editable="true" data-field="secondsLabel">Seconds</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-item">
        <div class="footer-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2 C7 2 3 6 3 11 C3 18 12 22 12 22 C12 22 21 18 21 11 C21 6 17 2 12 2 Z" stroke="#00e6ff" stroke-width="2" fill="none"/>
            <circle cx="12" cy="11" r="3" fill="#00e6ff"/>
          </svg>
        </div>
        <div class="footer-text">
          <div class="footer-label" data-editable="true" data-field="venueLabel">Venue</div>
          <div class="footer-value" data-editable="true" data-field="venueValue">Neon Arena · Los Angeles</div>
        </div>
      </div>

      <div class="footer-center">
        <div class="footer-center-label" data-editable="true" data-field="hashLabel">Join The Conversation</div>
        <div class="footer-center-hashtag" data-editable="true" data-field="hashValue">#NEONPULSE2026</div>
      </div>

      <div class="footer-item right">
        <div class="footer-text" style="text-align:right;">
          <div class="footer-label" data-editable="true" data-field="datesLabel">Festival Dates</div>
          <div class="footer-value" data-editable="true" data-field="datesValue">April 24 – 26, 2026</div>
        </div>
        <div class="footer-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="6" width="16" height="15" rx="2" stroke="#ff00aa" stroke-width="2" fill="none"/>
            <path d="M4 11 L20 11" stroke="#ff00aa" stroke-width="2"/>
            <path d="M9 3 L9 8 M15 3 L15 8" stroke="#ff00aa" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
