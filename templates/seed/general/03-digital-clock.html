<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-a: #E2D0B0; --bg-b: #D9C4A0; --ink: #2C1810; --ink-body: #4A2D18; --ink-muted: #7A4A28; --brass: #8B6F2E; }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background: radial-gradient(ellipse at 50% 0%, rgba(139,111,46,0.08), transparent 60%), linear-gradient(168deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }
    body::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle at 22% 30%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px), radial-gradient(circle at 70% 65%, rgba(44,24,16,0.028) 0.5px, transparent 1px);
      background-size: 42px 42px, 66px 66px; }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }
    .tz { position: absolute; top: 150px; left: 0; right: 0; text-align: center; z-index: 5; font-family: 'Cormorant SC', serif; font-size: 22px; letter-spacing: 8px; color: var(--brass); text-transform: uppercase; }
    .time { position: absolute; top: 230px; left: 0; right: 0; text-align: center; z-index: 5; font-family: 'DM Serif Display', serif; font-size: 480px; color: var(--ink); line-height: 0.85; letter-spacing: -10px; }
    .rule { position: absolute; top: 760px; left: 50%; transform: translateX(-50%); width: 400px; height: 1px; background: var(--brass); z-index: 5; }
    .rule::before, .rule::after { content: ''; position: absolute; top: -3px; width: 7px; height: 7px; background: var(--brass); transform: rotate(45deg); }
    .rule::before { left: -3px; } .rule::after { right: -3px; }
    .day { position: absolute; top: 790px; left: 0; right: 0; text-align: center; z-index: 5; font-family: 'DM Serif Display', serif; font-size: 56px; color: var(--ink); }
    .date { position: absolute; top: 870px; left: 0; right: 0; text-align: center; z-index: 5; font-family: 'Lora', serif; font-style: italic; font-size: 28px; color: var(--ink-muted); }
    .footer { position: absolute; bottom: 130px; left: 0; right: 0; text-align: center; z-index: 5; display: flex; justify-content: center; gap: 60px; }
    .foot-item { font-family: 'Cormorant SC', serif; font-size: 16px; letter-spacing: 5px; color: var(--brass); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="tz" data-editable="true" data-field="timezone">Pacific Standard Time</div>
  <div class="time" data-editable="true" data-field="time">10</div>
  <div class="rule"></div>
  <div class="day" data-editable="true" data-field="dayOfWeek">Wednesday</div>
  <div class="date" data-editable="true" data-field="date">January 15, 2026</div>
  <div class="footer">
    <div class="foot-item" data-editable="true" data-field="temperature">72&deg;F / 22&deg;C</div>
    <div class="foot-item" data-editable="true" data-field="location">San Francisco, CA</div>
    <div class="foot-item" data-editable="true" data-field="sunset">Sunset 5:18 PM</div>
  </div>
</body>
</html>
