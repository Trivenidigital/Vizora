<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg-a: #E2D0B0; --bg-b: #D9C4A0; --ink: #2C1810; --ink-body: #4A2D18; --ink-muted: #7A4A28; --brass: #8B6F2E; }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background: radial-gradient(ellipse at 50% 0%, rgba(139,111,46,0.08), transparent 60%), linear-gradient(168deg, var(--bg-a) 0%, var(--bg-b) 100%);
    }
    body::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle at 22% 30%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px), radial-gradient(circle at 70% 65%, rgba(44,24,16,0.028) 0.5px, transparent 1px);
      background-size: 42px 42px, 66px 66px; }
    .frame { position: absolute; inset: 72px; border: 1px solid var(--brass); z-index: 1; }
    .frame::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); }
    .layout { position: absolute; inset: 160px 200px; display: grid; grid-template-columns: 520px 1fr; gap: 80px; align-items: center; z-index: 5; }
    .qr-wrap { background: rgba(255,248,232,0.45); border: 1px solid var(--brass); padding: 44px; position: relative; aspect-ratio: 1; }
    .qr-wrap::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(139,111,46,0.22); pointer-events: none; }
    .qr-placeholder { width: 100%; height: 100%; background: repeating-conic-gradient(#2C1810 0% 25%, #E2D0B0 0% 50%) 50% / 22px 22px; opacity: 0.85; display: flex; align-items: center; justify-content: center; }
    .qr-label { font-family: 'Cormorant SC', serif; font-size: 14px; letter-spacing: 5px; color: #E2D0B0; background: rgba(44,24,16,0.85); padding: 10px 22px; text-transform: uppercase; }
    .content { color: var(--ink-body); }
    .badge { display: inline-block; font-family: 'Cormorant SC', serif; font-size: 16px; letter-spacing: 6px; color: var(--brass); text-transform: uppercase; padding: 8px 20px; border: 1px solid var(--brass); margin-bottom: 30px; }
    .heading { font-family: 'DM Serif Display', serif; font-size: 110px; color: var(--ink); line-height: 0.95; margin-bottom: 30px; }
    .description { font-family: 'Lora', serif; font-style: italic; font-size: 24px; color: var(--ink-muted); line-height: 1.5; margin-bottom: 40px; max-width: 680px; }
    .cta { padding: 24px 30px; border: 1px solid var(--brass); background: rgba(255,248,232,0.3); max-width: 540px; position: relative; }
    .cta::before { content: ''; position: absolute; inset: 6px; border: 1px solid rgba(139,111,46,0.22); pointer-events: none; }
    .cta-text { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); margin-bottom: 4px; }
    .cta-hint { font-family: 'Lora', serif; font-style: italic; font-size: 16px; color: var(--ink-muted); }
    .info-row { position: absolute; bottom: 140px; left: 200px; right: 200px; display: flex; justify-content: space-between; z-index: 5; }
    .info-item { font-family: 'Cormorant SC', serif; font-size: 15px; letter-spacing: 5px; color: var(--brass); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="layout">
    <div class="qr-wrap"><div class="qr-placeholder"><span class="qr-label" data-editable="true" data-field="qrLabel">QR Code Here</span></div></div>
    <div class="content">
      <div class="badge" data-editable="true" data-field="badgeText">Quick Access</div>
      <h1 class="heading" data-editable="true" data-field="heading">Scan to </h1>
      <p class="description" data-editable="true" data-field="description">Point your phone's camera at the QR code to instantly access our services. No app download required.</p>
      <div class="cta">
        <div class="cta-text" data-editable="true" data-field="ctaText">Scan with Camera</div>
        <div class="cta-hint" data-editable="true" data-field="ctaHint">Works with iPhone, Android, and most modern devices</div>
      </div>
    </div>
  </div>
  <div class="info-row">
    <div class="info-item" data-editable="true" data-field="infoType">Website URL</div>
    <div class="info-item" data-editable="true" data-field="infoAccess">Public</div>
  </div>
</body>
</html>
