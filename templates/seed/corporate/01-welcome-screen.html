<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Corporate Welcome Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+SC:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-a: #EADDBE;
      --bg-b: #E2D0B0;
      --ink: #2C1810;
      --ink-body: #4A2D18;
      --ink-muted: #7A4A28;
      --brass: #8B6F2E;
      --royal: #3D1F14;
      --rule: rgba(139,111,46,0.4);
    }
    body {
      width: 1920px; height: 1080px; overflow: hidden; position: relative;
      font-family: 'Lora', serif; color: var(--ink-body);
      background:
        radial-gradient(ellipse at 30% 0%, rgba(139,111,46,0.08), transparent 60%),
        radial-gradient(ellipse at 70% 100%, rgba(61,31,20,0.05), transparent 55%),
        linear-gradient(165deg, #EADDBE 0%, #E2D0B0 100%);
    }
    body::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 21% 29%, rgba(44,24,16,0.035) 0.6px, transparent 1.1px),
        radial-gradient(circle at 71% 64%, rgba(44,24,16,0.028) 0.5px, transparent 1px),
        radial-gradient(circle at 86% 34%, rgba(44,24,16,0.022) 0.5px, transparent 1px);
      background-size: 38px 38px, 54px 54px, 70px 70px;
    }
    .frame {
      position: absolute; inset: 72px;
      border: 1px solid var(--brass); z-index: 1;
    }
    .frame::before {
      content: ''; position: absolute; inset: 10px;
      border: 1px solid rgba(139,111,46,0.22);
    }

    .container {
      position: absolute; inset: 72px; z-index: 2;
      display: grid; grid-template-columns: 1fr 1fr; align-items: center;
    }

    .left-panel {
      padding: 90px 100px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .crest { margin-bottom: 44px; opacity: 0.9; }
    .welcome-label {
      font-family: 'Cormorant SC', serif;
      font-size: 22px; letter-spacing: 8px; font-weight: 600;
      color: var(--brass); text-transform: uppercase;
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 18px;
    }
    .welcome-label::before {
      content: ''; width: 48px; height: 1px; background: var(--brass);
    }
    .company-name {
      font-family: 'DM Serif Display', serif;
      font-size: 108px; font-weight: 400;
      color: var(--royal); line-height: 0.95;
      margin-bottom: 28px; letter-spacing: -1px;
    }
    .tagline {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 26px; color: var(--ink-muted);
      line-height: 1.5; max-width: 620px;
    }

    .right-panel {
      padding: 90px 100px 90px 40px;
      display: flex; justify-content: center; align-items: center;
    }
    .info-card {
      width: 100%; max-width: 640px;
      padding: 64px 60px;
      background: rgba(255,248,232,0.32);
      border: 1px solid var(--brass);
      position: relative;
    }
    .info-card::before {
      content: ''; position: absolute; inset: 8px;
      border: 1px solid rgba(139,111,46,0.25); pointer-events: none;
    }
    .time-display {
      font-family: 'DM Serif Display', serif;
      font-size: 128px; color: var(--royal);
      line-height: 1; letter-spacing: -2px;
      margin-bottom: 10px;
    }
    .date-display {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 26px; color: var(--ink-muted);
      margin-bottom: 38px;
    }
    .divider {
      width: 80px; height: 1px; background: var(--brass);
      margin-bottom: 38px;
    }
    .greeting-text {
      font-family: 'DM Serif Display', serif;
      font-size: 38px; color: var(--ink);
      line-height: 1.3; margin-bottom: 28px;
    }
    .location-text {
      font-family: 'Lora', serif; font-size: 22px;
      color: var(--ink-muted);
      display: flex; align-items: center; gap: 14px;
    }
    .location-icon { width: 22px; height: 22px; color: var(--brass); flex-shrink: 0; }

    .accent-badge {
      position: absolute; z-index: 3;
      background: rgba(255,248,232,0.42);
      border: 1px solid var(--brass);
      padding: 14px 26px;
      font-family: 'Cormorant SC', serif;
      font-size: 16px; letter-spacing: 4px; font-weight: 600;
      color: var(--brass); text-transform: uppercase;
      display: flex; align-items: center; gap: 12px;
    }
    .badge-wifi { bottom: 110px; left: 130px; }
    .badge-floor { bottom: 110px; right: 130px; }
    .badge-icon { width: 20px; height: 20px; color: var(--brass); flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="frame"></div>

  <div class="container">
    <div class="left-panel">
      <svg class="crest" width="96" height="38" viewBox="0 0 96 38">
        <g fill="none" stroke="#8B6F2E" stroke-width="1.2">
          <path d="M10 34 L10 16 L24 26 L40 6 L48 20 L56 6 L72 26 L86 16 L86 34 Z" fill="rgba(139,111,46,0.14)"/>
          <circle cx="48" cy="4" r="2" fill="#3D1F14" stroke="none"/>
          <circle cx="24" cy="26" r="1.4" fill="#3D1F14" stroke="none"/>
          <circle cx="72" cy="26" r="1.4" fill="#3D1F14" stroke="none"/>
        </g>
      </svg>
      <div class="welcome-label"><span data-editable="true" data-field="welcome-label">Welcome to</span></div>
      <h1 class="company-name" data-editable="true" data-field="company-name">Acme Corp</h1>
      <p class="tagline" data-editable="true" data-field="tagline">Innovation starts here. Building the future, one idea at a time.</p>
    </div>

    <div class="right-panel">
      <div class="info-card">
        <div class="time-display" data-editable="true" data-field="time">09:30</div>
        <div class="date-display" data-editable="true" data-field="date">Monday, February 26, 2026</div>
        <div class="divider"></div>
        <div class="greeting-text" data-editable="true" data-field="greeting">Good morning. Have a wonderful day ahead.</div>
        <div class="location-text">
          <svg class="location-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <span data-editable="true" data-field="location">Main Lobby - Building A, Floor 1</span>
        </div>
      </div>
    </div>
  </div>

  <div class="accent-badge badge-wifi">
    <svg class="badge-icon" viewBox="0 0 24 24" fill="none">
      <path d="M2 8.5C5 5.5 8.5 4 12 4s7 1.5 10 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M5 12c2-2 4.5-3 7-3s5 1 7 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M8 15.5c1.25-1.25 2.5-1.75 4-1.75s2.75 0.5 4 1.75" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
    </svg>
    <span data-editable="true" data-field="wifi-name">Guest WiFi: AcmeGuest</span>
  </div>
  <div class="accent-badge badge-floor">
    <svg class="badge-icon" viewBox="0 0 24 24" fill="none">
      <path d="M3 21h18M5 21V10l7-5 7 5v11" stroke="currentColor" stroke-width="1.6"/>
      <path d="M9 21v-6h6v6" stroke="currentColor" stroke-width="1.6"/>
    </svg>
    <span data-editable="true" data-field="floor-info">Reception - Ground Floor</span>
  </div>
</body>
</html>
